spring.application.name=telemedicine-backend

# =============================================================================
# All secrets and environment-specific values come from the environment
# (local .env, Docker, Kubernetes Secret -> env, or Secret Manager + CSI).
# Copy env.example to .env for local development (do not commit .env).
# =============================================================================

# --- PostgreSQL (required) ---
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA (overridden per profile: application-dev.properties / application-prod.properties) ---

# --- JWT (required; use a long random value in production, e.g. from a Secret) ---
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# --- AI (Groq) — API key required for symptom analysis ---
ai.api.key=${AI_API_KEY}
ai.api.url=${AI_API_URL:https://api.groq.com/openai/v1/chat/completions}

# --- Google Places (optional; leave empty to disable nearby-clinic lookup) ---
google.places.api.key=${GOOGLE_PLACES_API_KEY:}
google.places.text-search-url=${GOOGLE_PLACES_TEXT_SEARCH_URL:https://maps.googleapis.com/maps/api/place/textsearch/json}
google.places.nearby-search-url=${GOOGLE_PLACES_NEARBY_SEARCH_URL:https://maps.googleapis.com/maps/api/place/nearbysearch/json}
google.places.details-url=${GOOGLE_PLACES_DETAILS_URL:https://maps.googleapis.com/maps/api/place/details/json}
google.places.search-radius-meters=${GOOGLE_PLACES_SEARCH_RADIUS_METERS:5000}

# --- CORS: comma-separated origins (add your production DNS when you deploy) ---
# Example: https://app.example.com,https://www.example.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,https://telemedicine-frontend-7pjt.vercel.app}

# Default profile: dev-friendly JPA settings; use prod on GKE (see application-prod.properties)
spring.profiles.default=dev
